<div class="card">
  <h1 class="title">{{ translate.t('auth.signIn.title') }}</h1>
  <p class="subtitle">{{ translate.t('auth.signIn.subtitle') }}</p>

  <form (submit)="onSubmit($event)">
    <toki-input
      [label]="translate.t('auth.signIn.emailLabel')"
      type="email"
      [placeholder]="translate.t('auth.signIn.emailPlaceholder')"
      autocomplete="email"
      [formField]="loginForm.email"
    >
      <svg
        tokiPrefix
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect width="20" height="16" x="2" y="4" rx="2" />
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
      </svg>
    </toki-input>

    <toki-input
      [label]="translate.t('auth.signIn.passwordLabel')"
      type="password"
      [placeholder]="translate.t('auth.signIn.passwordPlaceholder')"
      autocomplete="current-password"
      [formField]="loginForm.password"
    >
      <svg
        tokiPrefix
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </svg>
    </toki-input>

    <button
      toki-button
      disabled
      variant="primary"
      type="submit"
      [loading]="submitting()"
      style="width: 100%"
    >
      {{ translate.t('auth.signIn.submit') }}
    </button>
  </form>

  <div class="divider">
    <span>{{ translate.t('auth.signIn.or') }}</span>
  </div>

  <div class="signup-prompt">
    <span>{{ translate.t('auth.signIn.noAccount') }}</span>
    <a toki-button variant="ghost" routerLink="/waitlist"
    >{{ translate.t('auth.signIn.joinWaitlist') }}</a>
  </div>
</div>
